<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Cadastro</title>
</head>
<body>

    <h2>Criar Usuário</h2>

    {% if erro %}
    <p style="color:red;">{{ erro }}</p>
    {% endif %}
    
    <form action="/cadastrar_usuario" method="post">
        
        <input type="text" name="cpf" id="cpf" placeholder="Digite seu CPF" required><br>
        <span id="cpf-status" style="font-size: 12px; display: block; margin-top: 5px;"></span><br>

        <input type="text" name="name" id="nome_servidor" placeholder="Nome do servidor (Preenchido pelo CPF)" readonly style="background-color: #e9e9e9; cursor: not-allowed;" required><br><br>
        
        <input type="text" name="cbo" id="cbo_servidor" placeholder="CBO do servidor (Preenchido pelo CPF)" readonly style="background-color: #e9e9e9; cursor: not-allowed;" required><br><br>
        
        <input type="email" name="email" placeholder="E-mail" required><br><br>
        <input type="password" name="senha" placeholder="Senha" required><br><br>
        <input type="password" name="confirmar_senha" placeholder="Confirmar Senha" required><br><br>

        <button type="submit" id="btn-cadastrar">Cadastrar</button>
    </form>

    <br>
    <a href="/">Voltar para login</a>

    <script>
    // 1. MÁSCARA AUTOMÁTICA: Formata o CPF visualmente enquanto o usuário digita
    document.getElementById('cpf').addEventListener('input', function(e) {
        let valor = e.target.value.replace(/\D/g, ''); // Remove tudo que não é dígito
        
        // Limita a 11 dígitos para evitar quebras
        if (valor.length > 11) {
            valor = valor.slice(0, 11);
        }

        // Aplica a formatação dinamicamente conforme o tamanho do texto
        if (valor.length > 9) {
            valor = valor.replace(/^(\d{3})(\d{3})(\d{3})(\d{1,2})$/, "$1.$2.$3-$4");
        } else if (valor.length > 6) {
            valor = valor.replace(/^(\d{3})(\d{3})(\d{1,3})$/, "$1.$2.$3");
        } else if (valor.length > 3) {
            valor = valor.replace(/^(\d{3})(\d{1,3})$/, "$1.$2");
        }

        e.target.value = valor; // Atualiza o valor do input na tela
        });

        // 2. VALIDAÇÃO: Dispara quando o usuário clica fora do campo (evento blur)
        document.getElementById('cpf').addEventListener('blur', function() {
            // Mantemos essa constante IGUAL: ela limpa a máscara para a API receber só números (11 dígitos)
            const cpf = this.value.replace(/\D/g, ''); 
            
            const statusSpan = document.getElementById('cpf-status');
            const nomeInput = document.getElementById('nome_servidor');
            const cboInput = document.getElementById('cbo_servidor');
            const btnCadastrar = document.getElementById('btn-cadastrar');

            if (cpf.length === 11) {
                statusSpan.style.color = 'gray';
                statusSpan.innerText = 'Verificando CPF na base do RH...';

                fetch(`/api/verificar_cpf/${cpf}`)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('CPF não autorizado');
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (data.existe) {
                            statusSpan.style.color = 'green';
                            statusSpan.innerText = '✓ Servidor autorizado para o sistema.';
                            nomeInput.value = data.nome;
                            cboInput.value = data.cbo;
                            btnCadastrar.disabled = false;
                        }
                    })
                    .catch(error => {
                        statusSpan.style.color = 'red';
                        statusSpan.innerText = '✕ Este CPF não consta na base de servidores autorizados.';
                        nomeInput.value = '';
                        cboInput.value = '';
                        btnCadastrar.disabled = true;
                    });
            } else {
                statusSpan.style.color = 'orange';
                statusSpan.innerText = 'Por favor, digite um CPF válido com 11 dígitos.';
                nomeInput.value = '';
                cboInput.value = '';
            }
        });
    </script>

</body>
</html>
