{% extends 'base.html' %}

{% block conteudo %}

<h2>Cadastrar Paciente</h2>

<form action="/salvar_paciente" method="post">
    <input type="text" name="prontuario" placeholder="Prontuário"><br><br>
    <input type="text" name="nome" placeholder="Nome"><br><br>
    <input type="text" name="cns" placeholder="CNS"><br><br>
    <input type="date" name="data_nascimento"><br><br>

    <button type="submit">Salvar</button>
</form>

{% endblock %}
