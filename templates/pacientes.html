<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Pacientes</title>
</head>
<body>

    <h2>Cadastro de Paciente</h2>

    <form action="/salvar_paciente" method="post">
        <input type="text" name="prontuario" placeholder="Prontuário" required><br><br>
        <input type="text" name="nome" placeholder="Nome" required><br><br>
        <input type="text" name="cns" placeholder="CNS"><br><br>
        <input type="date" name="data_nascimento"><br><br>

        <button type="submit">Salvar</button>
    </form>

    <hr>

    <h3>Pacientes cadastrados</h3>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Prontuário</th>
            <th>Nome</th>
            <th>CNS</th>
        </tr>

        {% for p in pacientes %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>{{ p[2] }}</td>
            <td>{{ p[3] }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
